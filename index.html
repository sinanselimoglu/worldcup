<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark">⚽</span>
        <h1>World Cup <span class="brand-accent">Live</span></h1>
      </div>
      <div class="header-actions">
        <div class="status-pill">
          <span class="dot"></span>
          <span id="status-line">Loading…</span>
        </div>
        <button id="refresh-btn" title="Refresh">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
          <span>Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="live">
      Live <span class="tab-count" id="live-count" hidden>0</span>
    </button>
    <button class="tab" data-tab="upcoming">Upcoming</button>
    <button class="tab" data-tab="finished">Results</button>
    <button class="tab" data-tab="standings">Standings</button>
  </nav>

  <main>
    <section id="live-panel" class="tab-panel active" data-panel="live">
      <div id="live-matches" class="match-list"></div>
    </section>

    <section id="upcoming-panel" class="tab-panel" data-panel="upcoming">
      <div id="upcoming-matches" class="match-list"></div>
    </section>

    <section id="finished-panel" class="tab-panel" data-panel="finished">
      <div id="finished-matches" class="match-list"></div>
    </section>

    <section id="standings-panel" class="tab-panel" data-panel="standings">
      <div id="standings" class="standings-grid"></div>
    </section>
  </main>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div id="modal-body"></div>
    </div>
  </div>

  <footer>
    <p>Data via football-data.org</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
